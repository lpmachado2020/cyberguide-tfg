services:
  cyberguide-app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cyberguide-app
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_CHAT_MODEL: llama3.1:8b
      OLLAMA_EMBED_MODEL: bge-m3:latest
      CHROMA_COLLECTION: cyberguide
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - chroma_data:/app/data/vectorstore/chroma
      - processed_data:/app/data/processed
      - ./references:/app/references:ro
    restart: unless-stopped

  cyberguide-ingest:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cyberguide-ingest
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_CHAT_MODEL: llama3.1:8b
      OLLAMA_EMBED_MODEL: bge-m3:latest
      CHROMA_COLLECTION: cyberguide
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - chroma_data:/app/data/vectorstore/chroma
      - processed_data:/app/data/processed
      - ./references:/app/references:ro
    working_dir: /app
    command: ["python", "scripts/ingest_corpus.py", "--root", "references/incibe-pdfs"]
    profiles:
      - tools

volumes:
  chroma_data:
  processed_data:
