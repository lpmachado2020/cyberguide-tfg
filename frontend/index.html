<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberGuide · Asistente de ciberseguridad para pymes</title>
    <meta
      name="description"
      content="CyberGuide es un asistente conversacional para reforzar la ciberseguridad de pymes y autónomos: consulta el corpus, analiza PDFs y revisa capturas."
    />
    <meta name="author" content="CyberGuide" />
    <link rel="canonical" href="/" />

    <meta property="og:title" content="CyberGuide · Asistente de ciberseguridad" />
    <meta property="og:description" content="Asistente local para ciberseguridad en pymes y autónomos." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script>
      (() => {
        const STORAGE_KEY = "cg-theme";
        const raw = window.localStorage.getItem(STORAGE_KEY);
        const pref = raw === "light" || raw === "dark" || raw === "system" ? raw : "dark";
        const resolved =
          pref === "system"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : pref;
        const root = document.documentElement;
        root.classList.remove("light", "dark");
        root.classList.add(resolved);
        root.style.colorScheme = resolved;
        root.dataset.themePreference = pref;
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
